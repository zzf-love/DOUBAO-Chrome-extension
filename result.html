<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>AI 截图解读 — 全屏模式</title>
  <style>
    :root {
      --brand-from: #4f8cff;
      --brand-to:   #7a5cff;
      --header-from: #4f8cff;
      --header-to:   #7a5cff;
      --bg:         #f8f9fc;
      --surface:    #ffffff;
      --border:     #e5e7eb;
      --text:       #1f2329;
      --text-sec:   #4b5563;
      --text-mute:  #9ca3af;
      --kbd-bg:     #f3f4f6;
      --capture-bg: #f3f4f6;
      --error:      #dc2626;
      --spin-bg:    #d1d5db;
    }
    body[data-theme="dark"] {
      --brand-from: #6b8eff;
      --brand-to:   #a78bff;
      --header-from: #1c2230;
      --header-to:   #2a2440;
      --bg:         #0f1419;
      --surface:    #1c2128;
      --border:     #2d333b;
      --text:       #c9d1d9;
      --text-sec:   #8b949e;
      --text-mute:  #6e7681;
      --kbd-bg:     #21262d;
      --capture-bg: #21262d;
      --error:      #f87171;
      --spin-bg:    #30363d;
    }
    body[data-theme="sakura"] {
      --brand-from: #f472b6;
      --brand-to:   #c084fc;
      --header-from: #f472b6;
      --header-to:   #c084fc;
      --bg:         #fdf2f8;
      --surface:    #ffffff;
      --border:     #fbcfe8;
      --text:       #500724;
      --text-sec:   #9d174d;
      --text-mute:  #db7185;
      --kbd-bg:     #fce7f3;
      --capture-bg: #fce7f3;
      --error:      #e11d48;
      --spin-bg:    #fbcfe8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
            "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .2s, color .2s;
    }
    .header {
      background: linear-gradient(135deg, var(--header-from), var(--header-to));
      color: #fff;
      padding: 14px 18px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header p  { font-size: 12px; opacity: .9; margin-top: 2px; }
    .source {
      font-size: 11px;
      opacity: .75;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .body { padding: 16px 18px 24px; }

    .capture-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .capture {
      width: 100%;
      display: block;
      max-height: 360px;
      object-fit: contain;
      background: var(--capture-bg);
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font: 600 13px inherit;
      transition: opacity .15s;
    }
    button:hover { opacity: .88; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, var(--brand-from), var(--brand-to));
      color: #fff;
    }
    .btn-secondary {
      background: var(--kbd-bg);
      color: var(--text-sec);
      border: 1px solid var(--border);
    }

    .result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      min-height: 80px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-sec);
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--spin-bg);
      border-top-color: var(--brand-from);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-text {
      white-space: pre-wrap;
      line-height: 1.75;
      color: var(--text);
    }
    .result-text p { margin-bottom: 10px; }
    .result-text p:last-child { margin-bottom: 0; }
    .error { color: var(--error); }

    .result-actions {
      margin-top: 10px;
      display: none;
    }
    .result.done .result-actions { display: flex; gap: 8px; }
    .btn-mini {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-sec);
    }
    .btn-mini:hover { border-color: var(--brand-from); color: var(--brand-from); }

    .footer {
      padding: 10px 18px 14px;
      font-size: 11px;
      color: var(--text-mute);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI 截图解读 — 全屏模式</h1>
    <p>当前页面不支持框选（PDF / chrome:// / 受限页面），已自动捕获整页交给 AI</p>
    <div class="source" id="source"></div>
  </div>

  <div class="body">
    <div class="capture-wrap">
      <img id="capture" class="capture" alt="captured page" />
    </div>

    <div class="actions">
      <button class="btn-primary" id="analyze">让 AI 解读</button>
      <button class="btn-secondary" id="close">关闭</button>
    </div>

    <div class="result" id="result">
      <div class="status">
        <span class="spinner"></span>
        <span>准备好后点击「让 AI 解读」</span>
      </div>
      <div class="result-actions">
        <button class="btn-mini" id="copy">复制结果</button>
      </div>
    </div>
  </div>

  <div class="footer">AI 截图解读 · 全屏回退模式</div>

  <script src="result.js"></script>
</body>
</html>
